<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STV</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      background: radial-gradient(circle at center, #1d0033 0%, #090014 40%, #000000 100%);
      position: relative;
      color: white;
    }

    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle linear infinite;
    }

    @keyframes twinkle {
      0% {
        opacity: 0.2;
        transform: scale(0.5);
      }
      50% {
        opacity: 1;
        transform: scale(1.4);
      }
      100% {
        opacity: 0.2;
        transform: scale(0.5);
      }
    }

    .nebula {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: float 10s ease-in-out infinite alternate;
      z-index: 0;
    }

    .nebula1 {
      background: #ff00ff;
      top: -150px;
      left: -100px;
    }

    .nebula2 {
      background: #00ffff;
      bottom: -200px;
      right: -100px;
    }

    .nebula3 {
      background: #ff4d6d;
      top: 20%;
      right: 15%;
    }

    @keyframes float {
      from {
        transform: translateY(0px) translateX(0px);
      }
      to {
        transform: translateY(30px) translateX(40px);
      }
    }

    .container {
      position: relative;
      z-index: 5;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }

    .love-title {
      font-size: 5rem;
      font-family: 'Great Vibes', cursive;
      color: #fff;
      text-shadow: 0 0 10px #ff69b4,
                   0 0 20px #ff1493,
                   0 0 40px #ff00ff,
                   0 0 80px #ff00ff;
      animation: glow 2s ease-in-out infinite alternate;
      margin-bottom: 20px;
    }

    @keyframes glow {
      from {
        transform: scale(1);
      }
      to {
        transform: scale(1.05);
      }
    }

    .subtitle {
      font-size: 1.3rem;
      max-width: 800px;
      line-height: 1.8;
      color: #ffe6ff;
      animation: fadeIn 4s ease;
      margin-bottom: 40px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .photo-frame {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      padding: 8px;
      background: linear-gradient(45deg, #ff00ff, #00ffff, #ff1493, #ffd700);
      background-size: 400% 400%;
      animation: borderFlow 6s ease infinite;
      box-shadow: 0 0 30px rgba(255,255,255,0.5);
      position: relative;
      overflow: hidden;
    }

    @keyframes borderFlow {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,0.2);
    }

    .orbit {
      position: absolute;
      width: 420px;
      height: 420px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      animation: rotate 20s linear infinite;
    }

    .planet {
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: -9px;
      left: 50%;
      box-shadow: 0 0 20px white;
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    .heart {
      position: absolute;
      color: #ff4d6d;
      font-size: 24px;
      animation: floatHeart linear infinite;
      opacity: 0.7;
      z-index: 2;
    }

    @keyframes floatHeart {
      from {
        transform: translateY(100vh) scale(0.5) rotate(0deg);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      to {
        transform: translateY(-100px) scale(1.5) rotate(360deg)
        opacity: 0;
      }
    }

    .flower {
      position: absolute;
      font-size: 28px;
      animation: flowerDance linear infinite;
      z-index: 3;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
    }

    @keyframes flowerDance {
      0% {
        transform: translateY(100vh) rotate(0deg) scale(0.7);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      50% {
        transform: translateY(50vh) rotate(180deg) scale(1);
      }
      100% {
        transform: translateY(-120px) rotate(360deg) scale(1.3);
        opacity: 0;
      }
    }

    .shooting-star {
      position: absolute;
      width: 180px;
      height: 2px;
      background: linear-gradient(to right, white, transparent);
      transform: rotate(-45deg);
      animation: shooting 4s linear infinite;
      z-index: 2;
    }

    @keyframes shooting {
      0% {
        transform: translateX(-200px) translateY(-200px) rotate(-45deg);
        opacity: 1;
      }
      100% {
        transform: translateX(1600px) translateY(800px) rotate(-45deg);
        opacity: 0;
      }
    }

    .message {
      margin-top: 40px;
      font-size: 1.2rem;
      color: #fff0f5;
      animation: pulse 2s infinite;
      padding: 15px 25px;
      border-radius: 30px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
      100% {
        transform: scale(1);
      }
    }

    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      animation: sparkleAnim 3s linear infinite;
    }

    @keyframes sparkleAnim {
      0% {
        transform: scale(0) rotate(0deg);
        opacity: 0;
      }
      50% {
        transform: scale(2) rotate(180deg);
        opacity: 1;
      }
      100% {
        transform: scale(0) rotate(360deg);
        opacity: 0;
      }
    }

    .music-note {
      position: absolute;
      color: rgba(255,255,255,0.6);
      font-size: 22px;
      animation: musicFloat 8s linear infinite;
    }

    @keyframes musicFloat {
      from {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      to {
        transform: translateY(-120px) rotate(360deg);
        opacity: 0;
      }
    }

    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.7);
      z-index: 10;
    }

    @media (max-width: 768px) {
      .love-title {
        font-size: 3.5rem;
      }

      .photo-frame {
        width: 220px;
        height: 220px;
      }

      .orbit {
        width: 320px;
        height: 320px;
      }

      .subtitle {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <audio id="backgroundAudio" src="sempurna.mp3" preload="auto" loop></audio>

  <div class="stars"></div>

  <div class="nebula nebula1"></div>
  <div class="nebula nebula2"></div>
  <div class="nebula nebula3"></div>

  <div class="shooting-star" style="top:10%; left:-200px; animation-delay:0s"></div>
  <div class="shooting-star" style="top:30%; left:-400px; animation-delay:2s"></div>
  <div class="shooting-star" style="top:60%; left:-600px; animation-delay:4s"></div>

  <div class="container">

    <h1 class="love-title">❤ For Stevanny ❤</h1>

    <p class="subtitle">
      Di antara jutaan bintang di galaksi ini,
      hanya satu yang paling bersinar di hatiku.
      Kamu adalah alasan semua warna menjadi lebih indah.
    </p>

    <div class="orbit">
      <div class="planet"></div>
    </div>

    <div class="photo-frame">
      <img src="pani.jpeg" alt="Pani">
    </div>

    <div class="message">
      ✨ Every moment with you feels like a beautiful universe ✨
    </div>

  </div>

  <div class="footer">
    Made with Love 💖
  </div>

  <script>
    const starsContainer = document.querySelector('.stars');

    for (let i = 0; i < 250; i++) {
      const star = document.createElement('div');
      star.classList.add('star');

      const size = Math.random() * 4;

      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDuration = (Math.random() * 5 + 2) + 's';
      star.style.animationDelay = Math.random() * 5 + 's';

      starsContainer.appendChild(star);
    }

    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤';

      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = (Math.random() * 25 + 15) + 'px';
      heart.style.animationDuration = (Math.random() * 5 + 5) + 's';

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 10000);
    }

    setInterval(createHeart, 300);

    const flowers = ['🌸', '🌺', '🌹', '💐', '🌷', '🌻'];

    function createFlower() {
      const flower = document.createElement('div');
      flower.classList.add('flower');
      flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];

      flower.style.left = Math.random() * 100 + 'vw';
      flower.style.animationDuration = (Math.random() * 8 + 6) + 's';
      flower.style.fontSize = (Math.random() * 25 + 20) + 'px';

      document.body.appendChild(flower);

      setTimeout(() => {
        flower.remove();
      }, 15000);
    }

    setInterval(createFlower, 500);

    function createSparkle() {
      const sparkle = document.createElement('div');
      sparkle.classList.add('sparkle');

      sparkle.style.left = Math.random() * 100 + 'vw';
      sparkle.style.top = Math.random() * 100 + 'vh';
      sparkle.style.animationDuration = (Math.random() * 3 + 2) + 's';

      document.body.appendChild(sparkle);

      setTimeout(() => {
        sparkle.remove();
      }, 4000);
    }

    setInterval(createSparkle, 200);

    function createMusic() {
      const music = document.createElement('div');
      music.classList.add('music-note');
      music.innerHTML = ['♫', '♪', '♬'][Math.floor(Math.random() * 3)];

      music.style.left = Math.random() * 100 + 'vw';
      music.style.animationDuration = (Math.random() * 6 + 5) + 's';

      document.body.appendChild(music);

      setTimeout(() => {
        music.remove();
      }, 12000);
    }

    setInterval(createMusic, 1500);

    document.addEventListener('mousemove', (e) => {
      const glow = document.createElement('div');

      glow.style.position = 'absolute';
      glow.style.width = '12px';
      glow.style.height = '12px';
      glow.style.borderRadius = '50%';
      glow.style.background = 'rgba(255,255,255,0.8)';
      glow.style.left = e.pageX + 'px';
      glow.style.top = e.pageY + 'px';
      glow.style.pointerEvents = 'none';
      glow.style.boxShadow = '0 0 20px white';
      glow.style.animation = 'sparkleAnim 1s linear forwards';

      document.body.appendChild(glow);

      setTimeout(() => {
        glow.remove();
      }, 1000);
    });

    const backgroundAudio = document.getElementById('backgroundAudio');
    backgroundAudio.volume = 0.5;

    function tryPlayAudio() {
      backgroundAudio.play().catch(() => {
        // Autoplay terblokir browser, musik akan menyala saat layar disentuh/diklik
      });
    }

    document.addEventListener('DOMContentLoaded', tryPlayAudio);
    document.addEventListener('click', () => {
      if (backgroundAudio.paused) {
        backgroundAudio.play().catch(() => {});
      }
    });
  </script>

</body>
</html>
